<!DOCTYPE html>
<html>
    <head>
        <title>Square Game</title>
        <link rel="stylesheet" type="text/css" href="style.css">
        <link rel="stylesheet" type="text/css" href="menus.css">
        <link rel="icon" type="image/png" href="favicon.png">
    </head>
    <body>
        <div id="dashboard">
            <span id="dash_home" class="left" title="Home">
                <a href="/">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path fill-rule="evenodd" clip-rule="evenodd" d="M8.36 1.37L14.72 7.17L14.01 7.88L13 6.96V13.49L12.5 13.99H9.5L9 13.49V9.99H7V13.49L6.5 13.99H3.5L3 13.49L3 6.97L2 7.88L1.29 7.17L7.64 1.37H8.36ZM4 6.06V12.99H6V9.49L6.5 8.99H9.5L10 9.49V12.99H12V6.05L8 2.43L4 6.06Z"/>
                    </svg>
                </a>
            </span>
            <span class="left" id="dash_new" data-action="resetGame" title="New Game">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <path fill-rule="evenodd" clip-rule="evenodd" d="M5.56253 2.516C3.46348 3.45 2 5.5541 2 7.9999C2 11.3137 4.6863 14 8 14C11.3137 14 14 11.3137 14 7.9999C14 5.3252 12.2497 3.0592 9.832 2.2848L9.5297 3.2383C11.5429 3.8845 13 5.7721 13 7.9999C13 10.7614 10.7614 13 8 13C5.2386 13 3 10.7614 3 7.9999C3 6.311 3.8374 4.8177 5.1197 3.9125L5.5625 2.516Z"/>
                    <path fill-rule="evenodd" clip-rule="evenodd" d="M5 3H2V2H5.5L6 2.5V6H5V3Z"/>
                </svg>
            </span>
            <span class="left" id="dash_settings" data-menu="settings" data-action="openMenu" title="Settings">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path fill-rule="evenodd" clip-rule="evenodd" d="M19.85 8.75L24 9.58V14.42L19.85 15.25L22.2 18.77L18.77 22.2L15.25 19.85L14.42 24H9.58L8.75 19.85L5.23 22.2L1.8 18.77L4.15 15.25L0 14.42V9.58L4.15 8.75L1.8 5.23L5.23 1.8L8.75 4.15L9.58 0H14.42L15.25 4.15L18.77 1.8L22.2 5.23L19.85 8.75ZM18.28 13.82L22.28 13.01V11.01L18.28 10.2L17.74 8.9L20.03 5.47L18.6 4.04L15.17 6.33L13.87 5.79L13.06 1.79H11.06L10.25 5.79L8.95 6.33L5.52 4.04L4.09 5.47L6.38 8.9L5.84 10.2L1.84 11.01V13.01L5.84 13.82L6.38 15.12L4.09 18.55L5.52 19.98L8.95 17.69L10.25 18.23L11.06 22.23H13.06L13.87 18.23L15.17 17.69L18.6 19.98L20.03 18.55L17.74 15.12L18.28 13.82ZM10.0943 9.14807C10.6584 8.77118 11.3216 8.56995 12 8.56995C12.9089 8.57258 13.7798 8.93484 14.4225 9.57751C15.0652 10.2202 15.4274 11.0911 15.43 12C15.43 12.6784 15.2288 13.3416 14.8519 13.9056C14.475 14.4697 13.9394 14.9093 13.3126 15.1689C12.6859 15.4286 11.9962 15.4965 11.3308 15.3641C10.6654 15.2318 10.0543 14.9051 9.57457 14.4254C9.09488 13.9457 8.7682 13.3345 8.63585 12.6692C8.50351 12.0038 8.57143 11.3141 8.83104 10.6874C9.09065 10.0606 9.53029 9.52496 10.0943 9.14807ZM11.0499 13.4218C11.3311 13.6097 11.6618 13.71 12 13.71C12.2249 13.7113 12.4479 13.668 12.656 13.5825C12.8641 13.4971 13.0531 13.3712 13.2121 13.2122C13.3712 13.0531 13.497 12.8641 13.5825 12.656C13.668 12.4479 13.7113 12.2249 13.7099 12C13.7099 11.6618 13.6096 11.3311 13.4217 11.0499C13.2338 10.7687 12.9669 10.5496 12.6544 10.4202C12.3419 10.2907 11.9981 10.2569 11.6664 10.3229C11.3347 10.3889 11.03 10.5517 10.7909 10.7909C10.5517 11.03 10.3888 11.3347 10.3229 11.6664C10.2569 11.9981 10.2907 12.342 10.4202 12.6544C10.5496 12.9669 10.7687 13.2339 11.0499 13.4218Z"/>
                </svg>
            </span>
            <div id="dashContainer">
                <div id="dashTracker">
                    <span id="dashTracker_moves">0</span>
                    <span id="dashTracker_time">0s</span>
                </div>
                <div id="dashColor"></div>
            </div>
        </div>
        <!-- Single Dialog for all Menus -->
        <dialog id="menu-dialog" class="menu-panel">
            <header class="menu-header">
                <h2 class="menu-title"></h2>
                <button class="menu-close-btn" data-action="closeMenu" aria-label="Close">
                    <svg viewBox="0 0 16 16"><path d="M7.116 8l-4.558 4.558.884.884L8 8.884l4.558 4.558.884-.884L8.884 8l4.558-4.558-.884-.884L8 7.116 3.442 2.558l-.884.884L7.116 8z"/></svg>
                </button>
            </header>
            <div class="menu-content">
                <!-- Menu content is injected here by JavaScript -->
            </div>
        </dialog>

        <!-- Templates for Menu Content -->
        <div id="menu-templates" hidden>
            <template id="template-settings">
                <h2>Board Size: <i><span id="board-size"></span></i></h2>
                <input data-action="editSize" type="range" min="3" max="50" value="3">
            </template>
            <template id="template-win">
                <img src="imgs/win.svg" alt="You Won!">
                <h1 id="win-title" class="no-menu-close"></h1>
                <span id="win-details"></span>
                <div class="menu-actions">
                    <button data-action="resetGame" class="primary">Play Again!</button>
                </div>
            </template>

            <template id="template-daily">
                <h3>4x4</h3>
                <div id="daily_4"></div>
                <h3>8x8</h3>
                <div id="daily_8"></div>
                <h3>20x20</h3>
                <div id="daily_20"></div>
            </template>

            <template id="template-help">
                <div class="help-section">
                    <h3>Objective</h3>
                    <p>Move squares to align them into rows or columns of a single color.</p>
                    <img src="imgs/help/completed.png" alt="Completed Example">
                </div>
                <div class="help-section">
                    <h3>Controls</h3>
                    <p>Use WASD, Arrow Keys, or swipe to move the active square.</p>
                    <img src="imgs/help/wasd.svg" alt="WASD Controls">
                </div>
            </template>

            <template id="template-colors">
                <div id="menu_colors_list">
                    <!-- Color options will be populated here -->
                </div>
            </template>
            </template>
        </div>
        <div id="game">

        </div>
    </body>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script type="module" src="main.js"></script>
</html>
